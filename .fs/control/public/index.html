<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sterownik projektu</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font:16px/1.5 system-ui,sans-serif; background:#0b0e14; color:#e6e6e6;
         display:flex; flex-direction:column; height:100dvh; }
  header { padding:12px 16px; background:#11151f; font-weight:600; display:flex; align-items:center; gap:10px; }
  header button { background:#2a3142; color:#e6e6e6; border:0; border-radius:8px; padding:6px 12px; font:inherit; cursor:pointer; }
  header a { color:#7cc4ff; text-decoration:none; font-size:14px; }

  /* Panel opcji (⚙️) */
  #opts { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:10; }
  #opts .card { background:#11151f; border:1px solid #2a3142; border-radius:12px; padding:20px; min-width:280px; display:flex; flex-direction:column; gap:16px; }
  #opts h3 { margin:0; font-size:16px; }
  #opts label { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  #opts select { background:#0b0e14; color:#e6e6e6; border:1px solid #2a3142; border-radius:8px; padding:6px 8px; font:inherit; }
  #opts input[type=checkbox] { width:20px; height:20px; accent-color:#2e7d32; }
  #optsClose { background:#2a3142; color:#e6e6e6; border:0; border-radius:8px; padding:10px; font:inherit; cursor:pointer; }

  /* Wskaźnik pracy: pulsujący "sonar" w nagłówku, widoczny póki tura trwa */
  #busy { position:relative; width:14px; height:14px; flex:none; }
  #busy::before { content:''; position:absolute; inset:0; border-radius:50%; background:#2e7d32; }
  #busy::after { content:''; position:absolute; inset:0; border-radius:50%; background:#2e7d32; animation:ping 1.6s ease-out infinite; }
  @keyframes ping { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.6);opacity:0} }
  .grow { flex:1; }
  .hidden { display:none !important; }

  /* Lista sesji */
  #list { flex:1; overflow:auto; padding:12px; }
  #new { width:100%; background:#2e7d32; color:#fff; border:0; border-radius:10px; padding:14px; font:inherit; font-weight:600; cursor:pointer; margin-bottom:12px; }
  .sess { background:#11151f; border:1px solid #2a3142; border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; }
  .sess .t { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sess .m { color:#7a8699; font-size:13px; margin-top:2px; }
  .empty { color:#7a8699; text-align:center; padding:24px; }

  /* Rozmowa */
  #log { flex:1; overflow:auto; padding:16px; }
  .msg { margin:0 0 12px; white-space:pre-wrap; word-break:break-word; }
  .user { color:#7cc4ff; }
  .claude { background:#11151f; border-radius:10px; padding:10px 12px; }
  .tool { color:#c9a227; font-family:ui-monospace,monospace; font-size:13px; }
  .result { color:#7a8699; font-family:ui-monospace,monospace; font-size:12.5px; border-left:2px solid #2a3142; padding-left:8px; }
  form { display:flex; gap:8px; padding:12px; background:#11151f; padding-bottom:max(12px,env(safe-area-inset-bottom)); }
  textarea { flex:1; resize:none; background:#0b0e14; color:#e6e6e6; border:1px solid #2a3142;
             border-radius:10px; padding:10px; font:inherit; min-height:48px; }
  #mic { background:#2a3142; color:#e6e6e6; min-width:52px; font-size:20px; border:0; border-radius:10px; cursor:pointer; }
  #mic.rec { background:#c0392b; }
  #send { background:#2e7d32; color:#fff; border:0; border-radius:10px; padding:0 16px; font:inherit; font-weight:600; cursor:pointer; }
</style>
</head>
<body>

<!-- Widok: LISTA SESJI -->
<header id="hList">🗂️ Sesje projektu <span class="grow"></span><a id="appurl" class="hidden" target="_blank">🌐 podgląd</a></header>
<div id="list">
  <button id="new">➕ Nowa sesja</button>
  <div id="sessions"></div>
</div>

<!-- Widok: ROZMOWA -->
<header id="hChat" class="hidden">
  <button id="back">← Zakończ</button>
  <span id="chatTitle" class="grow">Sesja</span>
  <span id="busy" class="hidden" title="Proxy pracuje"></span>
  <button type="button" id="undo" title="Wycofaj całą sesję">⏪</button>
  <button type="button" id="deploy" title="Deploy LIVE na produkcję">🚀</button>
  <button type="button" id="cog" title="Opcje">⚙️</button>
</header>

<!-- Panel: OPCJE (⚙️) -->
<div id="opts" class="hidden">
  <div class="card">
    <h3>⚙️ Opcje</h3>
    <label>Styl odpowiedzi <select id="style"></select></label>
    <label>🔊 Głos i sonar <input type="checkbox" id="tts"></label>
    <label>Głos lektora <select id="voice"></select></label>
    <label>Prędkość <input type="range" id="rate" min="0.7" max="1.6" step="0.05"></label>
    <button id="optsClose">Zamknij</button>
  </div>
</div>
<div id="log" class="hidden"></div>
<form id="f" class="hidden">
  <button type="button" id="mic" title="Mów">🎤</button>
  <textarea id="q" placeholder="Powiedz albo napisz co zmienić…" autocomplete="off"></textarea>
  <button type="submit" id="send">Wyślij</button>
</form>

<script>
const $ = s => document.querySelector(s);
const listView = [$('#hList'), $('#list')];
const chatView = [$('#hChat'), $('#log'), $('#f')];
const log = $('#log'), q = $('#q'), f = $('#f'), mic = $('#mic'), styleSel = $('#style');
let session = null;

// Klucz dostępu z fragmentu URL (QR: #k=...). Fragment nie opuszcza
// przeglądarki — nie ma go w requestach, Refererze ani logach tunelu.
// Każdy fetch idzie z kluczem w headerze; server bez niego odpowiada 401.
const KEY = (location.hash.match(/k=([0-9a-f]+)/) || [])[1] || '';
const api = (url, opts = {}) => fetch(url, { ...opts, headers: { ...(opts.headers || {}), 'x-key': KEY } });

function show(views){ [...listView, ...chatView].forEach(el => el.classList.add('hidden')); views.forEach(el => el.classList.remove('hidden')); }

// ── Style: lista z serwera → dropdown, wybór w localStorage, słany z promptem ─
(async () => {
  try {
    const { styles = [] } = await (await api('/styles')).json();
    for (const s of styles) styleSel.add(new Option(s, s));
    const saved = localStorage.getItem('style');
    // Domyślnie żołnierski (jeśli jest), inaczej pierwszy z listy.
    styleSel.value = styles.includes(saved) ? saved
      : (styles.includes('zolnierski') ? 'zolnierski' : (styles[0] || ''));
  } catch {}
})();
styleSel.addEventListener('change', () => localStorage.setItem('style', styleSel.value));

// ── Adres aplikacji na Cloudflare (podgląd na drugim urządzeniu) ─
(async () => {
  try {
    const { url } = await (await api('/appurl')).json();
    if (url) { const a = $('#appurl'); a.href = url; a.classList.remove('hidden'); }
  } catch {}
})();

// ── Panel opcji (⚙️): styl + głos, zamiast dwóch elementów w nagłówku ─
const opts = $('#opts');
$('#cog').onclick = () => opts.classList.remove('hidden');
$('#optsClose').onclick = () => opts.classList.add('hidden');
opts.addEventListener('click', e => { if (e.target === opts) opts.classList.add('hidden'); });  // tap w tło = zamknij

// ── TTS: czytaj teksty Claude na bieżąco (kolejka utterances, bez cancel —
// wiadomości czytane po kolei; ostatnia = podsumowanie z protokołu).
// 🔊 wyłącza głos ORAZ sonar; ding końca tury zostaje. ─
const ttsBox = $('#tts');
let ttsOn = localStorage.getItem('tts') !== 'off';
ttsBox.checked = ttsOn;
ttsBox.onchange = () => {
  ttsOn = ttsBox.checked; localStorage.setItem('tts', ttsOn ? 'on' : 'off');
  if (!ttsOn) speechSynthesis?.cancel();
};
// Dwa głosy: Claude (domyślny pl) i echo usera (inny pl głos, a jak nie ma —
// ten sam z wyższym tonem, żeby odróżnić kto mówi). Lista głosów bywa pusta
// do zdarzenia 'voiceschanged'.
// Głos i prędkość wybierane w opcjach (localStorage). Lista głosów zależy od
// urządzenia — dropdown pokazuje co telefon faktycznie ma. Domyślnie próbujemy
// męskiego (heurystyka po nazwie: Android "...#male...", iOS "Krzysztof").
const voiceSel = $('#voice'), rateInput = $('#rate');
let rate = parseFloat(localStorage.getItem('rate')) || 1.15;
rateInput.value = rate;
rateInput.oninput = () => { rate = parseFloat(rateInput.value); localStorage.setItem('rate', rate); };
let vClaude = null, vUser = null;
function isMale(v){
  const n = v.name.toLowerCase();
  if (/female|kobie|zosia|\bewa\b|agnieszk|\bmaja\b|paulina|female/.test(n)) return false;
  return /\bmale\b|male_|męsk|krzysztof|marek|adam|\bjan\b|piotr|zbigniew|jacek/.test(n);
}
function pickVoices(){
  const all = speechSynthesis.getVoices();
  const pl = all.filter(v => /pl/i.test(v.lang));
  const list = pl.length ? pl : all;            // brak polskich → pokaż wszystkie
  if (voiceSel.options.length !== list.length){ // wypełnij dropdown gdy lista gotowa
    voiceSel.innerHTML = '';
    for (const v of list) voiceSel.add(new Option(v.name + (/pl/i.test(v.lang) ? '' : ' · ' + v.lang), v.name));
  }
  const saved = localStorage.getItem('voice');
  vClaude = list.find(v => v.name === saved)    // wybór usera...
         || pl.find(isMale) || pl[0] || all[0] || null;   // ...albo domyślnie męski pl
  if (vClaude) voiceSel.value = vClaude.name;
  // Echo usera: inny polski głos jeśli jest, inaczej ten sam (różnicowany tonem).
  vUser = pl.find(v => v !== vClaude && isMale(v)) || pl.find(v => v !== vClaude) || null;
}
voiceSel.onchange = () => { localStorage.setItem('voice', voiceSel.value); pickVoices(); };
if (window.speechSynthesis){ pickVoices(); speechSynthesis.onvoiceschanged = pickVoices; }
// Tekst tnie się na zdania (≤180 znaków/kawałek) i kolejkuje osobno. Powód:
// silniki TTS na Androidzie/Chrome ucinają pojedynczą długą wypowiedź po
// ~15 s — krótkie kawałki czytają się w całości, bez limitu długości raportu.
function chunk(text){
  const out = [];
  for (const s of text.replace(/\s+/g, ' ').match(/[^.!?…]+[.!?…]*/g) || []){
    let t = s.trim(); if (!t) continue;
    while (t.length > 180){ out.push(t.slice(0, 180)); t = t.slice(180); }   // twarde cięcie zdania-molocha
    out.push(t);
  }
  return out;
}
// who: 'claude' (domyślnie) albo 'user' (echo tego co powiedział user).
function speak(text, who){
  if (!ttsOn || !text || !window.speechSynthesis) return;
  const isUser = who === 'user';
  for (const part of chunk(text)){
    try {
      const u = new SpeechSynthesisUtterance(part);
      u.lang = 'pl-PL';
      if (isUser){ u.voice = vUser || vClaude; u.rate = rate * 1.05; u.pitch = vUser ? 1 : 0.85; }
      else { u.voice = vClaude; u.rate = rate; u.pitch = 1; }
      speechSynthesis.speak(u);   // dokleja do kolejki — nie przerywa czytanego
    } catch {}
  }
}

// ── Sygnał końca odpowiedzi: ding (WebAudio) + wibracja ─────
let actx = null;
function ding(){
  try {
    actx ??= new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination); o.frequency.value = 880;
    g.gain.setValueAtTime(0.001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25, actx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.4);
    o.start(); o.stop(actx.currentTime + 0.45);
  } catch {}
  navigator.vibrate?.(200);
}

// ── Sonar: miękki ping przy komunikacie technicznym (🔧 tool).
// ASMR zamiast piknięcia: niski sinus + drugi odstrojony o 3 Hz (dudnienie),
// lowpass zaokrągla brzeg, delay ze sprzężeniem daje ogon echa "pod wodą".
// Throttle — seria komend pod rząd to jeden ping, nie karabin. ─
let lastPing = 0;
function sonar(){
  if (!ttsOn) return;   // 🔊 off = cisza także dla sonaru
  if (performance.now() - lastPing < 2500) return;
  lastPing = performance.now();
  try {
    actx ??= new (window.AudioContext || window.webkitAudioContext)();
    const t = actx.currentTime;
    const g = actx.createGain(), lp = actx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 900;
    const dly = actx.createDelay(), fb = actx.createGain();
    dly.delayTime.value = 0.28; fb.gain.value = 0.38;
    g.connect(lp); lp.connect(actx.destination);
    lp.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(actx.destination);
    for (const f of [520, 523]) {
      const o = actx.createOscillator();
      o.frequency.value = f; o.connect(g);
      o.start(t); o.stop(t + 1.4);
    }
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.09, t + 0.06);   // miękki atak, bez kliknięcia
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.3);  // długi ogon
    setTimeout(() => { try { lp.disconnect(); dly.disconnect(); fb.disconnect(); } catch {} }, 4000);  // pętla echa nie wisi w grafie
  } catch {}
}

function add(who, text){
  const d = document.createElement('div');
  d.className = 'msg ' + who;
  d.textContent = (who==='user'?'🗣️ ':who==='tool'?'🔧 ':who==='result'?'↳ ':'') + text;
  log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
}

// ── Lista sesji ─────────────────────────────────────────────
async function loadList(){
  show(listView);
  const box = $('#sessions'); box.innerHTML = '<div class="empty">…</div>';
  try {
    const r = await api('/sessions');
    if (r.status === 401) { box.innerHTML = '<div class="empty">Brak lub nieaktualny klucz — zeskanuj aktualny kod QR z terminala.</div>'; return; }
    const arr = await r.json();
    if (!arr.length) { box.innerHTML = '<div class="empty">Brak sesji. Zacznij nową.</div>'; return; }
    box.innerHTML = '';
    for (const s of arr){
      const el = document.createElement('div'); el.className = 'sess';
      const when = new Date(s.mtime).toLocaleString('pl-PL');
      el.innerHTML = `<div class="t"></div><div class="m">${s.count} wiad. · ${when}</div>`;
      el.querySelector('.t').textContent = s.title;
      el.onclick = () => openSession(s.id, s.title);
      box.appendChild(el);
    }
  } catch(e){ box.innerHTML = '<div class="empty">Błąd: '+e.message+'</div>'; }
}

async function openSession(id, title){
  session = id; $('#chatTitle').textContent = title || 'Sesja';
  log.innerHTML = ''; show(chatView);
  try {
    const r = await api('/session/'+id+'/history'); const blocks = await r.json();
    for (const b of blocks) add(b.who, b.text);
  } catch(_){}
  q.focus();
}

$('#new').onclick = async () => {
  const r = await api('/session/new', {method:'POST'}); const {id} = await r.json();
  openSession(id, 'Nowa sesja');
};
$('#back').onclick = () => { session = null; loadList(); };

// ── Wspólny reader streamu NDJSON {who,text} → log (deploy / rollback) ─
async function streamInto(r){
  const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = '';
  for(;;){
    const {value,done} = await reader.read(); if(done) break;
    buf += dec.decode(value,{stream:true});
    let nl;
    while((nl = buf.indexOf('\n')) >= 0){
      const line = buf.slice(0,nl); buf = buf.slice(nl+1);
      if(!line.trim()) continue;
      let o; try { o = JSON.parse(line); } catch { continue; }
      if(o.who === 'done'){ ding(); continue; }
      add(o.who, o.text);
    }
  }
}

// ── Deploy LIVE na produkcję: guarded deploy.sh przez /deploy, streaming.
// sessionId w body: commit dosypany przez deploy liczy się do tej sesji (rollback go obejmie). ─
$('#deploy').onclick = async () => {
  if (!confirm('🚀 Wypchnąć LIVE na PRODUKCJĘ?')) return;
  try { actx ??= new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  setBusy(true);
  add('user', '🚀 Deploy LIVE');
  try {
    await streamInto(await api('/deploy', {method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({ sessionId: session })}));
  } catch(err){ add('result', '[błąd] '+err.message); }
  finally { setBusy(false); }
};

// ── Wycofanie sesji: revert wszystkich commitów sesji + deploy wersji sprzed niej ─
$('#undo').onclick = async () => {
  if (!session) return;
  if (!confirm('⏪ Wycofać WSZYSTKIE zmiany tej sesji i przywrócić na produkcji wersję sprzed niej?')) return;
  try { actx ??= new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  setBusy(true);
  add('user', '⏪ Wycofaj sesję');
  try { await streamInto(await api('/session/'+session+'/rollback', {method:'POST'})); }
  catch(err){ add('result', '[błąd] '+err.message); }
  finally { setBusy(false); }
};

// ── Wysyłanie + streaming odpowiedzi ────────────────────────
let stopRec = () => {};   // podpinane niżej, gdy jest Web Speech
f.addEventListener('submit', async e => {
  e.preventDefault();
  const prompt = q.value.trim(); if(!prompt || !session) return;
  stopRec();   // wysłanie = koniec nagrywania; nic już nie pisze do pola
  try { actx ??= new (window.AudioContext || window.webkitAudioContext)(); } catch {}  // gest usera → odblokuj audio
  speechSynthesis?.cancel();   // nowa tura = nie doczytuj starej
  add('user', prompt); q.value = '';
  speak(prompt, 'user');       // app powtarza głosem co user powiedział (inny głos)
  setBusy(true);               // belka zablokowana póki proxy pracuje
  try {
    const r = await api('/ask', {method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ sessionId: session, prompt, style: styleSel.value })});
    const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = '';
    for(;;){
      const {value,done} = await reader.read(); if(done) break;
      buf += dec.decode(value,{stream:true});
      let nl;
      while((nl = buf.indexOf('\n')) >= 0){
        const line = buf.slice(0,nl); buf = buf.slice(nl+1);
        if(!line.trim()) continue;
        let o; try { o = JSON.parse(line); } catch { continue; }
        if(o.who === 'claude') speak(o.text);   // czytaj na bieżąco; podsumowanie i tak jest ostatnie w kolejce
        if(o.who === 'tool') sonar();           // komunikat techniczny → cichy ping
        if(o.who === 'done'){ ding(); continue; }
        add(o.who, o.text);
      }
    }
  } catch(err){ add('result', '[błąd] '+err.message); }
  finally { setBusy(false); }
});

// Belka zablokowana w trakcie tury: pole, wyślij i mikrofon nieaktywne,
// żeby user nie wysłał drugiego promptu zanim proxy skończy.
const micSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
function setBusy(on){
  $('#busy').classList.toggle('hidden', !on);
  q.disabled = on; $('#send').disabled = on;
  if (micSupported) mic.disabled = on;   // gdy brak Web Speech mic zostaje trwale wyłączony
  q.placeholder = on ? 'Proxy pracuje… zaczekaj' : 'Powiedz albo napisz co zmienić…';
  if (on) stopRec();   // gdyby mikrofon był aktywny — twardy stop
}

// ── Głos: Web Speech (pl-PL) ────────────────────────────────
// continuous=false: Android w trybie continuous powtarza finalne wyniki (dublowanie).
// Krótkie sesje rozpoznawania + auto-restart w onend; zatwierdzony tekst ląduje w base.
// stopRec() = twardy stop: wysłanie formularza WYŁĄCZA mikrofon, a spóźnione
// zdarzenia onresult są ignorowane (nic nie wraca do pustego pola).
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR(); rec.lang='pl-PL'; rec.interimResults=true; rec.continuous=false;
  let listening=false, base='';
  stopRec = () => {
    listening=false; base='';
    try { rec.stop(); } catch(_){}
    mic.classList.remove('rec');
  };
  mic.addEventListener('click', () => {
    if (listening) { stopRec(); return; }
    base = q.value ? q.value+' ' : ''; listening=true;
    try { rec.start(); } catch(_){}
  });
  rec.onstart = () => mic.classList.add('rec');
  rec.onerror = () => stopRec();
  rec.onend = () => {
    if (!listening) { mic.classList.remove('rec'); return; }
    base = q.value ? q.value+' ' : '';        // zatwierdź skończoną wypowiedź
    try { rec.start(); } catch(_) { stopRec(); }  // słuchaj dalej (nowa czysta sesja)
  };
  rec.onresult = e => {
    if (!listening) return;                    // po stopie nic nie pisze do pola
    let t=''; for (const r of e.results) t += r[0].transcript;
    q.value = base + t;                        // przebudowa całości — idempotentne
  };
} else { mic.disabled = true; mic.title = 'Brak Web Speech API — pisz ręcznie'; }

loadList();
</script>
</body>
</html>
